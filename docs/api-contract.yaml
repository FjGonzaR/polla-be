openapi: 3.1.0
info:
  title: Polla Mundial 2026 API
  version: 0.1.0
  description: Backend privado de pronósticos para el Mundial 2026. ~20 participantes por invitación.

servers:
  - url: http://localhost:3000
    description: Local
  - url: https://api.polla2026.com
    description: Producción (TBD)

tags:
  - name: health
    description: Estado del servidor y conectividad a base de datos
  - name: auth
    description: Autenticación Google SSO y registro
  - name: admin
    description: Operaciones administrativas (requiere rol admin)
  - name: groups
    description: Grupos del torneo y predicciones de fase de grupos
  - name: ko
    description: Partidos de eliminación directa y predicciones KO
  - name: powerups
    description: Powerups del participante (caballo negro y decepción)
  - name: scoreboard
    description: Tabla de posiciones y podio

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [health]
      summary: Health check del servidor y BD
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Servidor y BD operativos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: BD no disponible
          content:
            application/json:
              schema:
                type: object
                required: [status, db, error]
                properties:
                  status:
                    type: string
                    example: error
                  db:
                    type: string
                    example: disconnected
                  error:
                    type: string
                    example: connect ECONNREFUSED 127.0.0.1:5433

  # ── AUTH ────────────────────────────────────────────────────────────────────

  /auth/google:
    post:
      tags: [auth]
      summary: Login o signup con Google SSO
      operationId: postAuthGoogle
      security: []
      description: >
        Recibe el ID token de Google. Si el email no existe crea el participante
        (201). Si ya existe loguea (200). El frontend usa hasJoined y hasPhone
        para determinar el siguiente paso:
          hasJoined false → pantalla de código de invitación
          hasJoined true + hasPhone false → pantalla de teléfono
          hasJoined true + hasPhone true → home
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
                  description: ID token obtenido del flujo OAuth de Google
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGci..."
                participant:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  name: "Luisa Gómez"
                  email: "luisa@gmail.com"
                  role: "participant"
                  hasJoined: true
                  hasPhone: true
        '201':
          description: Signup exitoso — usuario recién creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGci..."
                participant:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  name: "Luisa Gómez"
                  email: "luisa@gmail.com"
                  role: "participant"
                  hasJoined: false
                  hasPhone: false
        '400':
          description: Falta el campo credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "credential es requerido"
                code: "VALIDATION_ERROR"
        '401':
          description: ID token de Google inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Token de Google inválido"
                code: "INVALID_GOOGLE_TOKEN"

  /auth/join:
    post:
      tags: [auth]
      summary: Asocia al participante a la polla mediante código de invitación
      operationId: postAuthJoin
      description: >
        Se llama cuando hasJoined es false. Valida el código, lo marca como usado
        y asocia la invitación al participante. Requiere JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Código válido, participante asociado a la polla
          content:
            application/json:
              schema:
                type: object
                required: [ok, hasJoined]
                properties:
                  ok:        { type: boolean }
                  hasJoined: { type: boolean }
              example:
                ok: true
                hasJoined: true
        '400':
          description: Falta el campo code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "code es requerido"
                code: "VALIDATION_ERROR"
        '401':
          description: JWT ausente o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "No autorizado"
                code: "UNAUTHORIZED"
        '404':
          description: Código no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Código no encontrado"
                code: "INVITE_NOT_FOUND"
        '409':
          description: Código ya utilizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Código ya utilizado"
                code: "INVITE_ALREADY_USED"

  /auth/phone:
    post:
      tags: [auth]
      summary: Registra el número de teléfono del participante
      operationId: postAuthPhone
      description: >
        Se llama cuando hasPhone es false. El número se usa para los recordatorios
        de WhatsApp vía Baileys. Formato E.164 requerido. Requiere JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  pattern: '^\+[1-9]\d{7,14}$'
                  description: "Número en formato E.164, ej: +573001234567"
      responses:
        '200':
          description: Teléfono registrado correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, phone]
                properties:
                  ok:    { type: boolean }
                  phone: { type: string }
              example:
                ok: true
                phone: "+573001234567"
        '400':
          description: Formato de teléfono inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Formato inválido. Usa E.164 ej: +573001234567"
                code: "INVALID_PHONE"
        '401':
          description: JWT ausente o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "No autorizado"
                code: "UNAUTHORIZED"
        '409':
          description: Teléfono ya registrado en otro participante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Teléfono ya registrado"
                code: "PHONE_ALREADY_EXISTS"

  # ── ADMIN ───────────────────────────────────────────────────────────────────

  /admin/invitations:
    post:
      tags: [admin]
      summary: Genera uno o varios códigos de invitación de un solo uso
      operationId: postAdminInvitations
      responses:
        '200':
          description: Pendiente de implementar
    get:
      tags: [admin]
      summary: Lista códigos de invitación con estado y participante asignado
      operationId: getAdminInvitations
      responses:
        '200':
          description: Pendiente de implementar

  /admin/groups:
    post:
      tags: [admin]
      summary: Carga los 12 grupos con sus 4 equipos (solo una vez)
      operationId: postAdminGroups
      responses:
        '200':
          description: Pendiente de implementar

  /admin/ko/matches:
    post:
      tags: [admin]
      summary: Carga los partidos de una ronda KO con equipos conocidos
      operationId: postAdminKoMatches
      responses:
        '200':
          description: Pendiente de implementar

  /admin/ko/matches/{matchId}/result:
    put:
      tags: [admin]
      summary: Carga o corrige el resultado oficial de un partido KO
      operationId: putAdminKoMatchResult
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pendiente de implementar

  /admin/scoring-params:
    put:
      tags: [admin]
      summary: Edita los parámetros del sistema de puntuación
      operationId: putAdminScoringParams
      responses:
        '200':
          description: Pendiente de implementar

  /admin/top8:
    put:
      tags: [admin]
      summary: Actualiza el listado top 8 FIFA (foto fija pre-torneo)
      operationId: putAdminTop8
      responses:
        '200':
          description: Pendiente de implementar

  /admin/participants:
    get:
      tags: [admin]
      summary: Lista participantes con puntaje actual y datos de contacto
      operationId: getAdminParticipants
      responses:
        '200':
          description: Pendiente de implementar

  # ── GROUPS ──────────────────────────────────────────────────────────────────

  /groups:
    get:
      tags: [groups]
      summary: Lista los 12 grupos con sus equipos y flag is_top8
      operationId: getGroups
      responses:
        '200':
          description: Pendiente de implementar

  /groups/predictions:
    post:
      tags: [groups]
      summary: Guarda o actualiza el orden predicho de uno o varios grupos
      operationId: postGroupsPredictions
      responses:
        '200':
          description: Pendiente de implementar

  /groups/predictions/me:
    get:
      tags: [groups]
      summary: Predicciones propias con flag group_complete y candidatos a tercero
      operationId: getGroupsPredictionsMe
      responses:
        '200':
          description: Pendiente de implementar

  /groups/predictions/friends:
    get:
      tags: [groups]
      summary: Predicciones de todos los demás participantes (solo post-inicio)
      operationId: getGroupsPredictionsFriends
      responses:
        '200':
          description: Pendiente de implementar

  # ── KO ──────────────────────────────────────────────────────────────────────

  /ko/matches:
    get:
      tags: [ko]
      summary: Lista todos los partidos KO agrupados por ronda
      operationId: getKoMatches
      responses:
        '200':
          description: Pendiente de implementar

  /ko/matches/{matchId}:
    get:
      tags: [ko]
      summary: Detalle de un partido KO con resultado real y predicción propia
      operationId: getKoMatch
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pendiente de implementar

  /ko/matches/{matchId}/predictions:
    post:
      tags: [ko]
      summary: Registra predicción para un partido KO
      operationId: postKoMatchPrediction
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pendiente de implementar
    put:
      tags: [ko]
      summary: Edita la predicción de un partido KO
      operationId: putKoMatchPrediction
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pendiente de implementar

  /ko/matches/{matchId}/predictions/triple:
    put:
      tags: [ko]
      summary: Activa o desactiva el triple o nada para un partido
      operationId: putKoMatchPredictionTriple
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pendiente de implementar

  /ko/matches/{matchId}/predictions/friends:
    get:
      tags: [ko]
      summary: Pronósticos de todos los demás para un partido (solo post-inicio)
      operationId: getKoMatchPredictionsFriends
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pendiente de implementar

  # ── POWERUPS ────────────────────────────────────────────────────────────────

  /powerups/predictions:
    post:
      tags: [powerups]
      summary: Registra caballo negro y decepción
      operationId: postPowerupsPredictions
      responses:
        '200':
          description: Pendiente de implementar
    put:
      tags: [powerups]
      summary: Edita caballo negro y/o decepción
      operationId: putPowerupsPredictions
      responses:
        '200':
          description: Pendiente de implementar

  /powerups/predictions/me:
    get:
      tags: [powerups]
      summary: Powerups del participante autenticado con detalle del equipo
      operationId: getPowerupsPredictionsMe
      responses:
        '200':
          description: Pendiente de implementar

  /powerups/predictions/friends:
    get:
      tags: [powerups]
      summary: Powerups de todos los demás participantes (solo post-inicio)
      operationId: getPowerupsPredictionsFriends
      responses:
        '200':
          description: Pendiente de implementar

  # ── SCOREBOARD ──────────────────────────────────────────────────────────────

  /scoreboard:
    get:
      tags: [scoreboard]
      summary: Tabla de posiciones con puntaje total y desglose por fase
      operationId: getScoreboard
      responses:
        '200':
          description: Pendiente de implementar

  /scoreboard/podium:
    get:
      tags: [scoreboard]
      summary: Top 3 con premios (700K / 250K / 50K COP)
      operationId: getScoreboardPodium
      responses:
        '200':
          description: Pendiente de implementar

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          example: Recurso no encontrado
        code:
          type: string
          example: NOT_FOUND

    HealthResponse:
      type: object
      required: [status, db, timestamp]
      properties:
        status:
          type: string
          example: ok
        db:
          type: string
          example: connected
        timestamp:
          type: string
          format: date-time
          example: '2026-06-06T17:00:00.000Z'

    ParticipantMe:
      type: object
      required: [id, name, email, role, hasJoined, hasPhone]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [participant, admin]
        hasJoined:
          type: boolean
          description: "true si ya fue asociado a un código de invitación"
        hasPhone:
          type: boolean
          description: "true si ya registró número de WhatsApp"

    AuthResponse:
      type: object
      required: [token, participant]
      properties:
        token:
          type: string
          description: "JWT con expiración de 45 días"
        participant:
          $ref: '#/components/schemas/ParticipantMe'
