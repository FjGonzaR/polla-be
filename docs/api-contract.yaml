openapi: 3.1.0
info:
  title: Polla Mundial 2026 API
  version: 0.1.0
  description: Backend privado de pronósticos para el Mundial 2026. ~20 participantes por invitación.

servers:
  - url: http://localhost:3000
    description: Local
  - url: https://api.polla2026.com
    description: Producción (TBD)

tags:
  - name: health
    description: Estado del servidor y conectividad a base de datos
  - name: auth
    description: Autenticación Google SSO y registro
  - name: admin
    description: Operaciones administrativas (requiere rol admin)
  - name: groups
    description: Grupos del torneo y predicciones de fase de grupos
  - name: ko
    description: Partidos de eliminación directa y predicciones KO
  - name: powerups
    description: Powerups del participante (caballo negro y decepción)
  - name: scoreboard
    description: Tabla de posiciones y podio

security:
  - cookieAuth: []

paths:
  /health:
    get:
      tags: [health]
      summary: Health check del servidor y BD
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Servidor y BD operativos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: BD no disponible
          content:
            application/json:
              schema:
                type: object
                required: [status, db, error]
                properties:
                  status:
                    type: string
                    example: error
                  db:
                    type: string
                    example: disconnected
                  error:
                    type: string
                    example: connect ECONNREFUSED 127.0.0.1:5433

  # ── AUTH ────────────────────────────────────────────────────────────────────

  /auth/google:
    post:
      tags: [auth]
      summary: Login o signup con Google
      operationId: postAuthGoogle
      security: []
      description: >
        Endpoint unificado de autenticación. El FE obtiene el `credential` (ID token) vía
        @react-oauth/google y lo envía aquí.

        - **Login** (usuario existente): solo `credential`. El backend verifica el token,
          encuentra al participante y emite la cookie de sesión.

        - **Signup** (usuario nuevo): `credential` + `code` + `phone`. El backend verifica el
          token, valida el código de invitación y crea el participante en una transacción atómica.

        - **Falta de invitación**: si el usuario no existe y no se envían `code`/`phone`,
          retorna 403 NEEDS_SIGNUP — el FE debe mostrar el formulario de registro.

        La sesión se establece mediante una cookie HttpOnly `session` (JWT firmado, 30 días).
        El navegador la envía automáticamente en cada request posterior.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
                  description: ID token obtenido del flujo OAuth de Google (@react-oauth/google)
                code:
                  type: string
                  description: Código de invitación. Requerido solo para signup (usuario nuevo).
                phone:
                  type: string
                  pattern: '^\+[1-9]\d{7,14}$'
                  description: "Número E.164 ej: +573001234567. Requerido solo para signup."
            examples:
              login:
                summary: Login de usuario existente
                value: { credential: "eyJhbGci..." }
              signup:
                summary: Signup de usuario nuevo
                value: { credential: "eyJhbGci...", code: "X7K2MP", phone: "+573001234567" }
      responses:
        '200':
          description: Login o signup exitoso. Emite cookie de sesión HttpOnly.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "session=eyJ...; HttpOnly; Path=/; Max-Age=2592000; SameSite=Lax"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthParticipant'
              example:
                id: "123e4567-e89b-12d3-a456-426614174000"
                name: "Luisa Gómez"
                email: "luisa@gmail.com"
                role: "PARTICIPANT"
        '400':
          description: Formato de teléfono inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "INVALID_PHONE", message: "Formato inválido. Usa E.164, ej: +573001234567" }
        '401':
          description: Credential de Google inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "INVALID_CREDENTIAL", message: "Credential de Google inválido o expirado" }
        '403':
          description: Usuario no existe y no se enviaron code/phone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "NEEDS_SIGNUP", message: "Necesitas un código de invitación para registrarte" }
        '404':
          description: Código de invitación no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "INVITE_NOT_FOUND", message: "Código de invitación no encontrado" }
        '409':
          description: Código ya utilizado/expirado, o Google ID ya registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                codigo_usado:
                  value: { code: "INVITE_USED_OR_EXPIRED", message: "Código ya utilizado o expirado" }
                ya_registrado:
                  value: { code: "ALREADY_REGISTERED", message: "Ya existe un participante con este Google ID" }

  /auth/logout:
    post:
      tags: [auth]
      summary: Cierra la sesión del participante
      operationId: postAuthLogout
      security: []
      responses:
        '200':
          description: Sesión cerrada. Cookie eliminada.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "session=; Max-Age=0; HttpOnly; Path=/"
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
              example: { ok: true }

  # ── ADMIN ───────────────────────────────────────────────────────────────────

  /admin/invitations:
    post:
      tags: [admin]
      summary: Genera un código de invitación de un solo uso
      operationId: postAdminInvitations
      description: >
        Crea un único código alfanumérico aleatorio con validez de 24 horas.
        Solo accesible por admin.
      responses:
        '201':
          description: Código generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
              example:
                id: "uuid"
                code: "XKMP1234"
                status: "AVAILABLE"
                usedAt: null
                expiresAt: "2026-06-12T15:00:00.000Z"
                createdAt: "2026-06-11T15:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags: [admin]
      summary: Lista todos los códigos de invitación
      operationId: getAdminInvitations
      description: Soporta filtro opcional por estado y paginación. Solo accesible por admin.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [AVAILABLE, USED, EXPIRED]
          description: "Filtra por estado. Si se omite retorna todos."
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Número de página (base 1)."
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Cantidad de resultados por página."
      responses:
        '200':
          description: Lista paginada de invitaciones
          content:
            application/json:
              schema:
                type: object
                required: [data, total, page, pageSize]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invitation'
                  total:
                    type: integer
                    description: "Total de invitaciones que coinciden con el filtro."
                  page:
                    type: integer
                    description: "Página actual."
                  pageSize:
                    type: integer
                    description: "Tamaño de página usado."
              example:
                total: 2
                page: 1
                pageSize: 20
                data:
                  - { id: "uuid1", code: "XKMP1234", status: "USED",      usedAt: "2026-06-11T16:00:00Z", expiresAt: "2026-06-12T15:00:00Z", createdAt: "2026-06-11T15:00:00Z" }
                  - { id: "uuid2", code: "ABNQ5678", status: "AVAILABLE", usedAt: null,                   expiresAt: "2026-06-12T16:00:00Z", createdAt: "2026-06-11T16:00:00Z" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/groups:
    post:
      tags: [admin]
      summary: Carga los 12 grupos del torneo con sus equipos
      operationId: postAdminGroups
      description: >
        Operación de una sola vez antes del inicio del torneo.
        Acepta un array de 12 grupos, cada uno con sus 4 equipos.
        Falla si los grupos ya existen.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groups]
              properties:
                groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/GroupInput'
                  minItems: 12
                  maxItems: 12
      responses:
        '201':
          description: Grupos y equipos cargados correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, groupsCount, teamsCount]
                properties:
                  ok:          { type: boolean }
                  groupsCount: { type: integer }
                  teamsCount:  { type: integer }
              example: { ok: true, groupsCount: 12, teamsCount: 48 }
        '409':
          description: Los grupos ya fueron cargados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "GROUPS_ALREADY_LOADED", message: "Groups have already been loaded" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/ko/matches:
    post:
      tags: [admin]
      summary: Carga los partidos de una ronda KO
      operationId: postAdminKoMatches
      description: >
        Se llama ronda a ronda una vez que los cruces son oficiales.
        Requiere el slug de la ronda y un array de partidos.
        Cada partido incluye externalMatchId (ID 1–104 de la API externa worldcup2026)
        para poder consultar resultados en tiempo real.
        lockedAt se calcula automáticamente como scheduledAt - 30 minutos.


        **Modo manual** — Se envían todos los campos del partido (externalMatchId, matchNumber,
        scheduledAt, equipos). El backend persiste los datos tal como se reciben.


        **Modo API-fetch** — Se envía solo externalMatchId (sin scheduledAt). El backend consulta
        worldcup26.ir para obtener equipos, fecha y marcador inicial. También carga la info del estadio
        (nombre, ciudad, país, capacidad) y los scorers desde la API externa, almacenándolos en
        additionalData (JSONB).


        También acepta roundSlug GROUP para cargar partidos de fase de grupos destinados a una
        vista de "partidos del día" (no afecta predicciones KO).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roundSlug, matches]
              properties:
                roundSlug:
                  type: string
                  enum: [GROUP, R32, R16, QF, SF, THIRD, FINAL]
                matches:
                  type: array
                  items:
                    $ref: '#/components/schemas/KoMatchInput'
                  minItems: 1
            examples:
              manualMode:
                summary: "Modo manual — datos completos por partido"
                value:
                  roundSlug: "R32"
                  matches:
                    - externalMatchId: 73
                      matchNumber: 1
                      homeTeamId: null
                      awayTeamId: null
                      homeTeamLabel: "Runner-up Group A"
                      awayTeamLabel: "Runner-up Group B"
                      scheduledAt: "2026-06-28T12:00:00Z"
                    - externalMatchId: 74
                      matchNumber: 2
                      homeTeamId: "uuid-col"
                      awayTeamId: "uuid-bra"
                      homeTeamLabel: null
                      awayTeamLabel: null
                      scheduledAt: "2026-06-28T16:00:00Z"
              apiFetchMode:
                summary: "Modo API-fetch — solo externalMatchId, el backend consulta worldcup26.ir"
                value:
                  roundSlug: "R32"
                  matches:
                    - externalMatchId: 73
                    - externalMatchId: 74
      responses:
        '201':
          description: Partidos cargados correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, roundSlug, matchesCount]
                properties:
                  ok:           { type: boolean }
                  roundSlug:    { type: string }
                  matchesCount: { type: integer }
              example: { ok: true, roundSlug: "R32", matchesCount: 16 }
        '404':
          description: Ronda no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "ROUND_NOT_FOUND", message: "Round 'QF' not found" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/ko/matches/{matchId}/result:
    put:
      tags: [admin]
      summary: Carga o corrige el resultado oficial de un partido KO
      operationId: putAdminKoMatchResult
      description: >
        Registra el marcador a 120' y el equipo clasificado.
        winnerTeamId es siempre obligatorio para evitar ambigüedad en casos
        de penales donde el marcador no determina el ganador.
        Tras guardar el resultado, el sistema actualiza status a finished.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scoreHome, scoreAway, winnerTeamId]
              properties:
                scoreHome:    { type: integer, minimum: 0 }
                scoreAway:    { type: integer, minimum: 0 }
                winnerTeamId: { type: string, format: uuid }
            example:
              scoreHome: 1
              scoreAway: 1
              winnerTeamId: "uuid-col"
      responses:
        '200':
          description: Resultado registrado correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, matchId, scoreHome, scoreAway, winnerTeamId]
                properties:
                  ok:           { type: boolean }
                  matchId:      { type: string, format: uuid }
                  scoreHome:    { type: integer }
                  scoreAway:    { type: integer }
                  winnerTeamId: { type: string, format: uuid }
              example: { ok: true, matchId: "uuid", scoreHome: 1, scoreAway: 1, winnerTeamId: "uuid-col" }
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Partido no encontrado", code: "MATCH_NOT_FOUND" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/scoring-params/{key}:
    put:
      tags: [admin]
      summary: Actualiza el valor de un parámetro de puntuación
      operationId: putAdminScoringParams
      description: >
        Edita un parámetro por su key. El recálculo de puntajes
        se aplica en la siguiente corrida del cron o al consultar el scoreboard.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            enum:
              - pts_group_position_exact
              - pts_group_position_partial
              - bonus_group_complete
              - pts_third_correct
              - pts_ko_advances
              - pts_ko_exact_score
              - pts_dark_horse_per_round
              - pts_disappointment_per_round
              - mult_triple
              - scale_r32
              - scale_r16
              - scale_qf
              - scale_sf
              - scale_final
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: number }
            example: { value: 5 }
      responses:
        '200':
          description: Parámetro actualizado
          content:
            application/json:
              schema:
                type: object
                required: [ok, key, value, updatedAt]
                properties:
                  ok:        { type: boolean }
                  key:       { type: string }
                  value:     { type: number }
                  updatedAt: { type: string, format: date-time }
              example: { ok: true, key: "pts_ko_exact_score", value: 5, updatedAt: "2026-06-11T15:00:00Z" }
        '404':
          description: Key no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Parámetro no encontrado", code: "PARAM_NOT_FOUND" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/top8:
    put:
      tags: [admin]
      summary: Define los 8 equipos top FIFA
      operationId: putAdminTop8
      description: >
        Foto fija para todo el torneo. Marca como isTop8 true los equipos
        del array y false al resto. Se puede llamar varias veces para corregir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamIds]
              properties:
                teamIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 8
                  maxItems: 8
            example:
              teamIds:
                - "uuid-bra"
                - "uuid-fra"
                - "uuid-eng"
                - "uuid-arg"
                - "uuid-esp"
                - "uuid-por"
                - "uuid-bel"
                - "uuid-ned"
      responses:
        '200':
          description: Top 8 actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, teams]
                properties:
                  ok: { type: boolean }
                  teams:
                    type: array
                    items:
                      type: object
                      required: [id, name, code]
                      properties:
                        id:   { type: string, format: uuid }
                        name: { type: string }
                        code: { type: string }
                        flag: { type: [string, 'null'], description: "URL de la bandera del equipo" }
        '400':
          description: No se enviaron exactamente 8 IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "INVALID_TOP8_COUNT", message: "Exactly 8 team IDs required" }
        '404':
          description: Uno o más IDs de equipo no existen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "TEAM_NOT_FOUND", message: "One or more team IDs not found" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/participants:
    get:
      tags: [admin]
      summary: Lista participantes con puntaje actual y datos de contacto
      operationId: getAdminParticipants
      responses:
        '200':
          description: Lista de participantes
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminParticipant'
              example:
                data:
                  - id: "uuid-juan"
                    name: "Juan"
                    email: "juan@gmail.com"
                    phone: "+573001234567"
                    role: "PARTICIPANT"
                    totalScore: 145
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/groups/thirds:
    put:
      tags: [admin]
      summary: Registra los 8 mejores terceros oficiales del torneo
      operationId: putAdminGroupsThirds
      description: >
        El admin marca cuáles 8 equipos clasificaron como mejores terceros oficialmente.
        Todos los teamIds deben ser equipos que hayan quedado en posición 3 real según
        los standings del torneo. Dispara el recálculo de puntos por terceros.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamIds]
              properties:
                teamIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 8
                  maxItems: 8
            example:
              teamIds:
                - "uuid-col"
                - "uuid-uru"
                - "uuid-sen"
                - "uuid-pol"
                - "uuid-cro"
                - "uuid-aus"
                - "uuid-mar"
                - "uuid-irn"
      responses:
        '200':
          description: Terceros registrados correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
              example: { ok: true }
        '400':
          description: teamId no válido o cantidad incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cantidad_incorrecta:
                  value: { code: "INVALID_THIRDS_COUNT", message: "Exactly 8 team IDs required" }
                equipo_invalido:
                  value: { code: "INVALID_THIRD_TEAM", message: "Team uuid-xxx is not a third-place team" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/groups/{groupId}/locked:
    put:
      tags: [admin]
      summary: Abre o cierra un grupo para predicciones
      operationId: putAdminGroupLocked
      description: >
        Marca un grupo específico como cerrado (`locked: true`) o abierto (`locked: false`).
        Cuando está cerrado, cualquier intento de guardar predicciones para ese grupo
        retorna 423 GROUP_LOCKED. Independiente del candado global de la fase de grupos.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locked]
              properties:
                locked: { type: boolean }
            examples:
              cerrar:
                summary: Cerrar el grupo
                value: { locked: true }
              abrir:
                summary: Volver a abrir el grupo
                value: { locked: false }
      responses:
        '200':
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
              example: { ok: true }
        '404':
          description: Grupo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "GROUP_NOT_FOUND", message: "Group not found" }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/whatsapp/qr:
    get:
      tags: [admin]
      summary: Retorna el QR de WhatsApp para vincular el bot
      operationId: getAdminWhatsappQr
      description: >
        Retorna una imagen PNG con el QR para vincular la sesión de WhatsApp.
        Si la sesión ya está activa retorna status connected.
        Si aún no hay QR disponible retorna 503.
      responses:
        '200':
          description: QR como imagen PNG o status connected
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: connected }
        '503':
          description: QR aún no disponible — reintentar en unos segundos
          content:
            application/json:
              schema:
                type: object
                required: [status, message]
                properties:
                  status: { type: string, example: initializing }
                  message: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── GROUPS ──────────────────────────────────────────────────────────────────

  /groups:
    get:
      tags: [groups]
      summary: Lista los 12 grupos con sus equipos
      operationId: getGroups
      responses:
        '200':
          description: Lista de grupos
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
              example:
                data:
                  - id: "uuid-A"
                    label: "A"
                    name: "Grupo A"
                    locked: false
                    teams:
                      - id: "uuid-mex"
                        name: "México"
                        code: "MEX"
                        isTop8: false
                        flag: "https://flagcdn.com/w80/mx.png"
                        positionStats:
                          - { position: 1, pct: 60.0 }
                          - { position: 2, pct: 25.0 }
                          - { position: 3, pct: 15.0 }
                        standing:
                          realPosition: 1
                          pts: 6
                          matchesPlayed: 2
                          goalsFor: 4
                          goalsAgainst: 1
                          goalDiff: 3
                      - id: "uuid-usa"
                        name: "Estados Unidos"
                        code: "USA"
                        isTop8: true
                        flag: "https://flagcdn.com/w80/us.png"
                        positionStats: null
                        standing: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/matches:
    get:
      tags: [groups]
      summary: Lista los partidos de fase de grupos (informativo)
      operationId: getGroupMatches
      description: >
        Devuelve los partidos de fase de grupos (round.slug = GROUP) con marcador,
        estado y equipos. Es puramente informativo: estos partidos no impactan los
        puntos de la polla ni los score_events. El marcador y el estado los actualiza
        el cron sync-group-results desde la API externa.

        Ambos query params son opcionales y combinables.
      parameters:
        - name: date
          in: query
          required: false
          description: >
            Filtra solo los partidos de ese día calendario en hora de Colombia (UTC-5).
            Internamente el rango es [date T05:00Z, date+1 T05:00Z). Formato YYYY-MM-DD.
            Un valor mal formado devuelve 400 INVALID_DATE.
          schema:
            type: string
            format: date
            pattern: '^\d{4}-\d{2}-\d{2}$'
          example: "2026-06-14"
        - name: groupId
          in: query
          required: false
          description: Filtra solo los partidos del grupo indicado (por el grupo del equipo local).
          schema:
            type: string
            format: uuid
          example: "uuid-A"
      responses:
        '200':
          description: Lista de partidos de fase de grupos
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupMatch'
              example:
                data:
                  - id: "uuid-match-1"
                    matchNumber: 1
                    groupId: "uuid-A"
                    groupLabel: "A"
                    scheduledAt: "2026-06-14T18:00:00.000Z"
                    status: "FINISHED"
                    homeTeam:
                      id: "uuid-mex"
                      name: "México"
                      code: "MEX"
                      flag: "https://flagcdn.com/w80/mx.png"
                    awayTeam:
                      id: "uuid-usa"
                      name: "Estados Unidos"
                      code: "USA"
                      flag: "https://flagcdn.com/w80/us.png"
                    homeTeamLabel: "México"
                    awayTeamLabel: "Estados Unidos"
                    scoreHome: 2
                    scoreAway: 1
        '400':
          description: Query param date mal formado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "INVALID_DATE", message: "date must be in YYYY-MM-DD format" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/predictions:
    post:
      tags: [groups]
      summary: Guarda o actualiza predicciones de posiciones por grupo
      operationId: postGroupsPredictions
      description: >
        Acepta un array de uno o varios grupos. Hace upsert por grupo:
        si el participante ya tenía predicciones para ese grupo las reemplaza.
        Valida candado (antes del 11 de junio de 2026). Cada grupo debe incluir
        las 4 posiciones completas — no se admiten grupos parciales.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [predictions]
              properties:
                predictions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [groupId, rankings]
                    properties:
                      groupId:
                        type: string
                        format: uuid
                      rankings:
                        type: array
                        minItems: 4
                        maxItems: 4
                        items:
                          type: object
                          required: [teamId, position]
                          properties:
                            teamId:   { type: string, format: uuid }
                            position: { type: integer, minimum: 1, maximum: 4 }
            example:
              predictions:
                - groupId: "uuid-A"
                  rankings:
                    - { teamId: "uuid-mex", position: 1 }
                    - { teamId: "uuid-usa", position: 2 }
                    - { teamId: "uuid-col", position: 3 }
                    - { teamId: "uuid-ecu", position: 4 }
      responses:
        '200':
          description: Predicciones guardadas correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, savedGroups]
                properties:
                  ok:          { type: boolean }
                  savedGroups: { type: integer }
              example: { ok: true, savedGroups: 1 }
        '400':
          description: Payload inválido (posiciones duplicadas, equipos que no pertenecen al grupo, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Posiciones duplicadas en grupo A", code: "INVALID_RANKINGS" }
        '423':
          description: >
            Candado activo. Puede ser el candado global de fase de grupos o el cierre
            individual del grupo enviado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candado_global:
                  value: { code: "PREDICTIONS_LOCKED", message: "Las predicciones de grupos están cerradas" }
                grupo_cerrado:
                  value: { code: "GROUP_LOCKED", message: "Group A is closed for predictions" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/predictions/me:
    get:
      tags: [groups]
      summary: Mis predicciones de grupos con rankings completos
      operationId: getGroupsPredictionsMe
      description: >
        Retorna los 12 grupos con el orden predicho por el participante autenticado.
        groupComplete indica si el grupo tiene las 4 posiciones predichas.
        Grupos sin predicción retornan rankings vacío y groupComplete false.
      responses:
        '200':
          description: Predicciones propias
          content:
            application/json:
              schema:
                type: object
                required: [data, completedGroups]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupPrediction'
                  completedGroups:
                    type: integer
                    description: "Cuántos de los 12 grupos tienen predicción completa"
              example:
                completedGroups: 1
                data:
                  - groupId: "uuid-A"
                    label: "A"
                    name: "Grupo A"
                    groupComplete: true
                    rankings:
                      - { teamId: "uuid-mex", name: "México",         code: "MEX", isTop8: false, flag: "https://flagcdn.com/w80/mx.png", predictedPosition: 1, positionStats: { pct: 60.0 } }
                      - { teamId: "uuid-usa", name: "Estados Unidos", code: "USA", isTop8: true,  flag: "https://flagcdn.com/w80/us.png", predictedPosition: 2, positionStats: { pct: 45.0 } }
                      - { teamId: "uuid-col", name: "Colombia",       code: "COL", isTop8: false, flag: "https://flagcdn.com/w80/co.png", predictedPosition: 3, positionStats: null }
                      - { teamId: "uuid-ecu", name: "Ecuador",        code: "ECU", isTop8: false, flag: "https://flagcdn.com/w80/ec.png", predictedPosition: 4, positionStats: { pct: 30.0 } }
                  - groupId: "uuid-B"
                    label: "B"
                    name: "Grupo B"
                    groupComplete: false
                    rankings: []
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/predictions/friends:
    get:
      tags: [groups]
      summary: Predicciones de grupos de todos los demás participantes
      operationId: getGroupsPredictionsFriends
      description: >
        Solo disponible una vez iniciado el torneo (NOW() >= scheduledAt del primer partido).
        Si el torneo no ha iniciado retorna available false con la fecha de apertura.
        Si se pasa participantId, filtra los resultados a ese único participante
        (útil para ver el detalle de un amigo puntual sin traer toda la lista).
      parameters:
        - name: participantId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: >
            UUID del participante a filtrar. Si se omite retorna todos los demás participantes.
            No puede ser el id del participante autenticado.
      responses:
        '200':
          description: Predicciones disponibles
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ParticipantPredictions'
              examples:
                disponible:
                  value:
                    available: true
                    data:
                      - participant: { id: "uuid-juan", name: "Juan" }
                        totalGroupPoints: 22
                        predictions:
                          - groupId: "uuid-A"
                            label: "A"
                            name: "Grupo A"
                            groupComplete: true
                            rankings:
                              - { teamId: "uuid-bra", name: "Brasil", code: "BRA", isTop8: true, flag: "https://flagcdn.com/w80/br.png", predictedPosition: 1, positionStats: { pct: 55.0 } }
                no_disponible:
                  value:
                    available: false
                    availableAt: "2026-06-11T17:00:00.000Z"
        '400':
          description: participantId es el id del participante autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "INVALID_FRIEND", message: "Cannot request predictions for yourself" }
        '404':
          description: participantId no corresponde a ningún participante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { code: "PARTICIPANT_NOT_FOUND", message: "Participant not found" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/thirds:
    get:
      tags: [groups]
      summary: Candidatos a mejores terceros del participante autenticado
      operationId: getGroupsThirds
      description: >
        Retorna los equipos que el participante predijo en posición 3,
        uno por grupo. Solo aparecen grupos con predicción completa.
        El flag selected indica si ya fue marcado como mejor tercero
        en POST /groups/thirds.
      responses:
        '200':
          description: Lista de candidatos a tercero
          content:
            application/json:
              schema:
                type: object
                required: [data, selectedCount]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ThirdCandidate'
                  selectedCount:
                    type: integer
                    description: "Cuántos de los candidatos están marcados como mejor tercero (máx 8)"
              example:
                selectedCount: 2
                data:
                  - { teamId: "uuid-col", name: "Colombia", code: "COL", flag: "https://flagcdn.com/w80/co.png", groupId: "uuid-A", label: "A", selected: true  }
                  - { teamId: "uuid-uru", name: "Uruguay",  code: "URU", flag: "https://flagcdn.com/w80/uy.png", groupId: "uuid-B", label: "B", selected: false }
                  - { teamId: "uuid-sen", name: "Senegal",  code: "SEN", flag: "https://flagcdn.com/w80/sn.png", groupId: "uuid-C", label: "C", selected: true  }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [groups]
      summary: Guarda o reemplaza la selección de mejores terceros
      operationId: postGroupsThirds
      description: >
        Recibe exactamente 8 teamId. Todos deben ser equipos que el participante
        predijo en posición 3 (candidatos de GET /groups/thirds).
        Reemplaza cualquier selección previa (upsert completo).
        Valida candado (antes del 11 de junio de 2026).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamIds]
              properties:
                teamIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 8
                  maxItems: 8
            example:
              teamIds:
                - "uuid-col"
                - "uuid-uru"
                - "uuid-sen"
                - "uuid-pol"
                - "uuid-cro"
                - "uuid-aus"
                - "uuid-mar"
                - "uuid-irn"
      responses:
        '200':
          description: Mejores terceros guardados correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, selectedCount]
                properties:
                  ok:            { type: boolean }
                  selectedCount: { type: integer }
              example: { ok: true, selectedCount: 8 }
        '400':
          description: >
            Payload inválido. Posibles causas: no son exactamente 8 equipos,
            algún teamId no es candidato válido (no fue predicho en posición 3).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_es_candidato:
                  value: { error: "El equipo uuid-bra no es un tercero válido en tus predicciones", code: "INVALID_THIRD_CANDIDATE" }
                cantidad_incorrecta:
                  value: { error: "Debes seleccionar exactamente 8 equipos", code: "INVALID_THIRDS_COUNT" }
        '423':
          description: Candado activo — predicciones de grupos cerradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Las predicciones de grupos están cerradas", code: "PREDICTIONS_LOCKED" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── KO ──────────────────────────────────────────────────────────────────────

  /ko/matches:
    get:
      tags: [ko]
      summary: Lista los partidos de una ronda KO
      operationId: getKoMatches
      description: >
        Requiere el parámetro de query roundSlug. Retorna los partidos de esa
        ronda con resultado real (si existe) y la predicción propia del
        participante autenticado por partido.
        Si un partido tiene status finished o su scheduledAt + 90 min ya pasó
        sin resultado, el BE consulta la API externa worldcup2026, guarda el
        resultado y lo retorna.
      parameters:
        - name: roundSlug
          in: query
          required: true
          schema:
            type: string
            enum: [GROUP, R32, R16, QF, SF, THIRD, FINAL]
          description: "Ronda a consultar"
      responses:
        '200':
          description: Partidos de la ronda
          content:
            application/json:
              schema:
                type: object
                required: [round, matches]
                properties:
                  round:
                    $ref: '#/components/schemas/KoRound'
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/KoMatch'
              example:
                round: { slug: "R32", name: "Dieciseisavos", order: 1 }
                matches:
                  - id: "uuid-match-1"
                    externalMatchId: 73
                    matchNumber: 1
                    scheduledAt: "2026-06-28T12:00:00Z"
                    lockedAt: "2026-06-28T11:30:00Z"
                    status: "SCHEDULED"
                    homeTeam: null
                    awayTeam: null
                    homeTeamLabel: "Runner-up Group A"
                    awayTeamLabel: "Runner-up Group B"
                    result: null
                    myPrediction: null
                    stats: null
                  - id: "uuid-match-2"
                    externalMatchId: 74
                    matchNumber: 2
                    scheduledAt: "2026-06-28T16:00:00Z"
                    lockedAt: "2026-06-28T15:30:00Z"
                    status: "FINISHED"
                    homeTeam: { id: "uuid-col", name: "Colombia", code: "COL", flag: "https://flagcdn.com/w80/co.png" }
                    awayTeam: { id: "uuid-bra", name: "Brasil",   code: "BRA", flag: "https://flagcdn.com/w80/br.png" }
                    homeTeamLabel: null
                    awayTeamLabel: null
                    result: { scoreHome: 1, scoreAway: 1, winnerTeamId: "uuid-col" }
                    myPrediction:
                      scoreHome: 2
                      scoreAway: 0
                      teamAdvancesId: "uuid-col"
                      tripleActive: false
                      lockedIn: true
                    stats:
                      totalPredictions: 18
                      pctHomeWin: 55.6
                      pctDraw: 16.7
                      pctAwayWin: 27.8
                      pctTripleActive: 33.3
                      topScore: { home: 1, away: 0, pct: 22.2 }
        '400':
          description: roundSlug inválido o faltante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "roundSlug es requerido", code: "VALIDATION_ERROR" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ko/matches/{matchId}:
    get:
      tags: [ko]
      summary: Detalle de un partido KO específico
      operationId: getKoMatch
      description: >
        Mismo schema que un item de GET /ko/matches. Útil para refrescar
        un partido sin traer toda la ronda.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalle del partido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KoMatch'
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Partido no encontrado", code: "MATCH_NOT_FOUND" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ko/matches/{matchId}/predictions:
    post:
      tags: [ko]
      summary: Registra la predicción de un partido KO
      operationId: postKoMatchPrediction
      description: >
        Guarda marcador a 120', equipo que avanza y si activa triple o nada.
        Validaciones:
          - Candado del partido (NOW() < lockedAt)
          - teamAdvancesId debe ser homeTeamId o awayTeamId del partido
          - Si tripleActive true, el participante debe tener usos restantes (máx 3 en todo el torneo)
          - No se puede crear si el partido ya tiene resultado (status finished)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scoreHome, scoreAway, teamAdvancesId]
              properties:
                scoreHome:      { type: integer, minimum: 0 }
                scoreAway:      { type: integer, minimum: 0 }
                teamAdvancesId: { type: string, format: uuid }
                tripleActive:   { type: boolean, default: false }
            example:
              scoreHome: 2
              scoreAway: 0
              teamAdvancesId: "uuid-col"
              tripleActive: true
      responses:
        '201':
          description: Predicción registrada correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, tripleUsesRemaining]
                properties:
                  ok:                  { type: boolean }
                  tripleUsesRemaining: { type: integer, description: "Usos de triple restantes (0–3)" }
              example: { ok: true, tripleUsesRemaining: 2 }
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                equipo_invalido:
                  value: { error: "teamAdvancesId no corresponde a un equipo del partido", code: "INVALID_TEAM_ADVANCES" }
                triple_agotado:
                  value: { error: "No tienes usos de triple o nada disponibles", code: "TRIPLE_USES_EXHAUSTED" }
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Partido no encontrado", code: "MATCH_NOT_FOUND" }
        '409':
          description: Ya existe una predicción para este partido — usar PUT para editar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Ya existe una predicción para este partido", code: "PREDICTION_ALREADY_EXISTS" }
        '423':
          description: Partido bloqueado por candado o porque ya tiene resultado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candado:
                  value: { error: "El partido está cerrado para predicciones", code: "MATCH_LOCKED" }
                con_resultado:
                  value: { error: "El partido ya tiene resultado oficial", code: "MATCH_FINISHED" }
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [ko]
      summary: Edita la predicción de un partido KO
      operationId: putKoMatchPrediction
      description: >
        Permite modificar marcador, equipo que avanza y tripleActive.
        Validaciones:
          - Candado del partido (NOW() < lockedAt)
          - teamAdvancesId debe ser homeTeamId o awayTeamId del partido
          - Si tripleActive cambia de false a true, valida usos restantes
          - No se puede editar si el partido ya tiene resultado (status finished)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scoreHome, scoreAway, teamAdvancesId, tripleActive]
              properties:
                scoreHome:      { type: integer, minimum: 0 }
                scoreAway:      { type: integer, minimum: 0 }
                teamAdvancesId: { type: string, format: uuid }
                tripleActive:   { type: boolean }
            example:
              scoreHome: 1
              scoreAway: 1
              teamAdvancesId: "uuid-col"
              tripleActive: false
      responses:
        '200':
          description: Predicción actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                required: [ok, tripleUsesRemaining]
                properties:
                  ok:                  { type: boolean }
                  tripleUsesRemaining: { type: integer }
              example: { ok: true, tripleUsesRemaining: 3 }
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                equipo_invalido:
                  value: { error: "teamAdvancesId no corresponde a un equipo del partido", code: "INVALID_TEAM_ADVANCES" }
                triple_agotado:
                  value: { error: "No tienes usos de triple o nada disponibles", code: "TRIPLE_USES_EXHAUSTED" }
        '404':
          description: Predicción no encontrada — usar POST para crear
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "No existe predicción para este partido", code: "PREDICTION_NOT_FOUND" }
        '423':
          description: Partido bloqueado por candado o porque ya tiene resultado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candado:
                  value: { error: "El partido está cerrado para predicciones", code: "MATCH_LOCKED" }
                con_resultado:
                  value: { error: "El partido ya tiene resultado oficial", code: "MATCH_FINISHED" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ko/matches/{matchId}/predictions/friends:
    get:
      tags: [ko]
      summary: Predicciones de todos los demás participantes para un partido KO
      operationId: getKoMatchPredictionsFriends
      description: >
        Solo disponible una vez iniciado el partido (NOW() >= scheduledAt).
        Si el partido no ha iniciado retorna available false con la fecha de apertura.
        Incluye a todos los participantes, con prediction null si no han predicho.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Predicciones de amigos
          content:
            application/json:
              schema:
                type: object
                required: [available, matchId]
                properties:
                  available:   { type: boolean }
                  matchId:     { type: string, format: uuid }
                  availableAt:
                    type: [string, 'null']
                    format: date-time
                    description: "Solo presente cuando available es false"
                  data:
                    type: [array, 'null']
                    description: "Solo presente cuando available es true"
                    items:
                      $ref: '#/components/schemas/FriendKoPrediction'
              examples:
                disponible:
                  value:
                    available: true
                    matchId: "uuid-match-2"
                    availableAt: null
                    data:
                      - participant: { id: "uuid-juan", name: "Juan" }
                        prediction:
                          scoreHome: 1
                          scoreAway: 0
                          teamAdvancesId: "uuid-col"
                          tripleActive: false
                      - participant: { id: "uuid-maria", name: "María" }
                        prediction: null
                no_disponible:
                  value:
                    available: false
                    matchId: "uuid-match-1"
                    availableAt: "2026-06-28T12:00:00Z"
                    data: null
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Partido no encontrado", code: "MATCH_NOT_FOUND" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── POWERUPS ────────────────────────────────────────────────────────────────

  /powerups/predictions:
    post:
      tags: [powerups]
      summary: Registra el caballo negro y la decepción del participante
      operationId: postPowerupsPredictions
      description: >
        Crea los powerups obligatorios. Ambos campos son requeridos.
        Validaciones:
          - darkHorseTeamId debe pertenecer a un equipo con isTop8 false
          - disappointmentTeamId debe pertenecer a un equipo con isTop8 true
          - Valida candado de grupos (antes del 11 de junio de 2026)
          - Falla si el participante ya tiene powerups registrados — usar PUT para editar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [darkHorseTeamId, disappointmentTeamId]
              properties:
                darkHorseTeamId:
                  type: string
                  format: uuid
                  description: "Equipo fuera del top 8 FIFA"
                disappointmentTeamId:
                  type: string
                  format: uuid
                  description: "Equipo dentro del top 8 FIFA"
            example:
              darkHorseTeamId: "uuid-col"
              disappointmentTeamId: "uuid-bra"
      responses:
        '201':
          description: Powerups registrados correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyPowerups'
              example:
                darkHorse:      { teamId: "uuid-col", name: "Colombia", code: "COL", isTop8: false, flag: "https://flagcdn.com/w80/co.png", stats: { chosenPct: null } }
                disappointment: { teamId: "uuid-bra", name: "Brasil",   code: "BRA", isTop8: true,  flag: "https://flagcdn.com/w80/br.png", stats: { chosenPct: null } }
        '400':
          description: Validación de elegibilidad fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dark_horse_invalido:
                  value: { error: "El caballo negro debe ser un equipo fuera del top 8 FIFA", code: "INVALID_DARK_HORSE" }
                decepcion_invalida:
                  value: { error: "La decepción debe ser un equipo dentro del top 8 FIFA", code: "INVALID_DISAPPOINTMENT" }
        '409':
          description: El participante ya tiene powerups — usar PUT para editar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Ya tienes powerups registrados", code: "POWERUPS_ALREADY_EXISTS" }
        '423':
          description: Candado activo — powerups cerrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Los powerups están cerrados", code: "PREDICTIONS_LOCKED" }
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [powerups]
      summary: Edita el caballo negro y/o la decepción del participante
      operationId: putPowerupsPredictions
      description: >
        Reemplaza los powerups existentes. Ambos campos son requeridos.
        Aplica las mismas validaciones de elegibilidad que el POST.
        Valida candado de grupos (antes del 11 de junio de 2026).
        Falla si el participante no tiene powerups previos — usar POST para crear.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [darkHorseTeamId, disappointmentTeamId]
              properties:
                darkHorseTeamId:
                  type: string
                  format: uuid
                  description: "Equipo fuera del top 8 FIFA"
                disappointmentTeamId:
                  type: string
                  format: uuid
                  description: "Equipo dentro del top 8 FIFA"
            example:
              darkHorseTeamId: "uuid-mar"
              disappointmentTeamId: "uuid-fra"
      responses:
        '200':
          description: Powerups actualizados correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyPowerups'
              example:
                darkHorse:      { teamId: "uuid-mar", name: "Marruecos", code: "MAR", isTop8: false, flag: "https://flagcdn.com/w80/ma.png", stats: { chosenPct: null } }
                disappointment: { teamId: "uuid-fra", name: "Francia",   code: "FRA", isTop8: true,  flag: "https://flagcdn.com/w80/fr.png", stats: { chosenPct: null } }
        '400':
          description: Validación de elegibilidad fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                dark_horse_invalido:
                  value: { error: "El caballo negro debe ser un equipo fuera del top 8 FIFA", code: "INVALID_DARK_HORSE" }
                decepcion_invalida:
                  value: { error: "La decepción debe ser un equipo dentro del top 8 FIFA", code: "INVALID_DISAPPOINTMENT" }
        '404':
          description: No existen powerups previos — usar POST para crear
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "No tienes powerups registrados", code: "POWERUPS_NOT_FOUND" }
        '423':
          description: Candado activo — powerups cerrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Los powerups están cerrados", code: "PREDICTIONS_LOCKED" }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /powerups/predictions/me:
    get:
      tags: [powerups]
      summary: Powerups del participante autenticado
      operationId: getPowerupsPredictionsMe
      description: >
        Retorna siempre un objeto. darkHorse y disappointment son null
        si el participante aún no ha registrado sus powerups.
      responses:
        '200':
          description: Powerups del participante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyPowerups'
              examples:
                con_powerups:
                  value:
                    darkHorse:      { teamId: "uuid-col", name: "Colombia", code: "COL", isTop8: false, flag: "https://flagcdn.com/w80/co.png", stats: { chosenPct: 20.0 } }
                    disappointment: { teamId: "uuid-bra", name: "Brasil",   code: "BRA", isTop8: true,  flag: "https://flagcdn.com/w80/br.png", stats: { chosenPct: 35.0 } }
                sin_powerups:
                  value:
                    darkHorse:      null
                    disappointment: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /powerups/predictions/friends:
    get:
      tags: [powerups]
      summary: Powerups de todos los demás participantes
      operationId: getPowerupsPredictionsFriends
      description: >
        Solo disponible una vez iniciado el torneo (NOW() >= scheduledAt del primer partido).
        Si el torneo no ha iniciado retorna available false con la fecha de apertura.
        Participantes que no han guardado powerups aparecen con darkHorse y
        disappointment en null.
      responses:
        '200':
          description: Powerups de amigos
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:   { type: boolean }
                  availableAt:
                    type: [string, 'null']
                    format: date-time
                    description: "Solo presente cuando available es false"
                  data:
                    type: [array, 'null']
                    description: "Solo presente cuando available es true"
                    items:
                      $ref: '#/components/schemas/FriendPowerups'
              examples:
                disponible:
                  value:
                    available: true
                    availableAt: null
                    data:
                      - participant: { id: "uuid-juan", name: "Juan" }
                        darkHorse:      { teamId: "uuid-mar", name: "Marruecos", code: "MAR", isTop8: false, flag: "https://flagcdn.com/w80/ma.png" }
                        disappointment: { teamId: "uuid-fra", name: "Francia",   code: "FRA", isTop8: true,  flag: "https://flagcdn.com/w80/fr.png" }
                      - participant: { id: "uuid-maria", name: "María" }
                        darkHorse:      null
                        disappointment: null
                no_disponible:
                  value:
                    available: false
                    availableAt: "2026-06-11T17:00:00Z"
                    data: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── SCOREBOARD ──────────────────────────────────────────────────────────────

  /scoreboard:
    get:
      tags: [scoreboard]
      summary: Tabla de posiciones completa
      operationId: getScoreboard
      description: >
        Retorna todos los participantes ordenados por puntaje total descendente.
        El puntaje se calcula on-demand al momento del request.
        prize se incluye para rank 1, 2 y 3. Null para el resto.
        Criterio de desempate: mayor cantidad de marcadores exactos acertados en KO.
      responses:
        '200':
          description: Tabla de posiciones
          content:
            application/json:
              schema:
                type: object
                required: [updatedAt, data]
                properties:
                  updatedAt:
                    type: string
                    format: date-time
                    description: "Timestamp del último recálculo (on-demand)"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoreboardEntry'
              example:
                updatedAt: "2026-06-28T01:00:00.000Z"
                data:
                  - rank: 1
                    participant: { id: "uuid-juan",  name: "Juan" }
                    total: 145
                    prize: 700000
                  - rank: 2
                    participant: { id: "uuid-maria", name: "María" }
                    total: 132
                    prize: 250000
                  - rank: 3
                    participant: { id: "uuid-luis",  name: "Luis" }
                    total: 118
                    prize: 50000
                  - rank: 4
                    participant: { id: "uuid-pedro", name: "Pedro" }
                    total: 98
                    prize: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scoreboard/{participantId}/breakdown:
    get:
      tags: [scoreboard]
      summary: Desglose de puntaje por fase de un participante
      operationId: getScoreboardBreakdown
      description: >
        Retorna el desglose detallado de puntaje de cualquier participante.
        Accesible para todos los participantes autenticados — puedes ver el
        breakdown propio o el de cualquier amigo.
        tripleUsesRemaining refleja los usos de triple o nada restantes
        del participante consultado.
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "UUID del participante. Puede ser el propio o el de otro participante."
      responses:
        '200':
          description: Desglose de puntaje
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreBreakdown'
              example:
                participant: { id: "uuid-juan", name: "Juan" }
                total: 145
                breakdown:
                  groups: 42
                  thirds: 10
                  ko: 80
                  darkHorse: 16
                  disappointment: -3
                tripleUsesRemaining: 2
                prize: 700000
        '404':
          description: Participante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: { error: "Participante no encontrado", code: "PARTICIPANT_NOT_FOUND" }
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: >
        Cookie HttpOnly `session` emitida por POST /auth/google.
        JWT firmado con JWT_SECRET, expira en 30 días.
        El navegador la envía automáticamente — no requiere header explícito.

  responses:
    Unauthorized:
      description: Cookie de sesión ausente o inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            sin_cookie:
              value: { code: "MISSING_SESSION", message: "Sesión requerida" }
            cookie_invalida:
              value: { code: "INVALID_SESSION", message: "Sesión inválida o expirada" }
    Forbidden:
      description: El usuario autenticado no tiene rol admin
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example: { code: "FORBIDDEN", message: "Acceso denegado" }

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Recurso no encontrado

    HealthResponse:
      type: object
      required: [status, db, timestamp]
      properties:
        status:
          type: string
          example: ok
        db:
          type: string
          example: connected
        timestamp:
          type: string
          format: date-time
          example: '2026-06-06T17:00:00.000Z'

    AuthParticipant:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [PARTICIPANT, ADMIN]

    AdminParticipant:
      type: object
      required: [id, name, email, phone, role, totalScore]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        email:       { type: string, format: email }
        phone:       { type: [string, 'null'], description: "Número E.164 o null si no registró" }
        role:        { type: string, enum: [PARTICIPANT, ADMIN] }
        totalScore:  { type: integer, description: "Puntos acumulados hasta el momento" }

    Invitation:
      type: object
      required: [id, code, status, expiresAt, createdAt]
      properties:
        id:        { type: string, format: uuid }
        code:      { type: string }
        status:    { type: string, enum: [AVAILABLE, USED, EXPIRED] }
        usedAt:    { type: [string, 'null'], format: date-time }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    TeamInput:
      type: object
      required: [name, code, isTop8]
      properties:
        name:   { type: string }
        code:   { type: string, description: "Código ISO 3 letras, ej: COL" }
        isTop8: { type: boolean }
        flag:   { type: [string, 'null'], description: "URL de la bandera del equipo" }

    GroupInput:
      type: object
      required: [label, name, teams]
      properties:
        label: { type: string, description: "Letra del grupo, ej: A" }
        name:  { type: string, description: "Nombre completo, ej: Grupo A" }
        lastMatchAt:
          type: [string, 'null']
          format: date-time
          description: "Fecha del último partido del grupo. Opcional."
        teams:
          type: array
          items:
            $ref: '#/components/schemas/TeamInput'
          minItems: 4
          maxItems: 4

    KoMatchInput:
      type: object
      required: [externalMatchId]
      description: >
        Partido de fase KO o grupos. externalMatchId corresponde al ID numérico (1–104)
        de la API externa (worldcup2026), usado para consultar resultados en tiempo real.
        homeTeamId y awayTeamId son opcionales cuando los cruces aún no se conocen;
        en ese caso se usan homeTeamLabel y awayTeamLabel como placeholders.
        Si scheduledAt se omite, el backend consulta la API externa para completar los datos
        (modo API-fetch).
      properties:
        externalMatchId:
          type: integer
          description: "ID numérico de la API externa worldcup2026 (1–104)"
        matchNumber:
          type: integer
          description: "Número de partido dentro de la ronda (1-based). Inferido del id externo en modo API-fetch."
        homeTeamId:
          type: [string, 'null']
          format: uuid
        awayTeamId:
          type: [string, 'null']
          format: uuid
        homeTeamLabel:
          type: [string, 'null']
          description: "Placeholder cuando el equipo aún no se conoce, ej: Runner-up Group A"
        awayTeamLabel:
          type: [string, 'null']
          description: "Placeholder cuando el equipo aún no se conoce, ej: Runner-up Group B"
        scheduledAt:
          type: [string, 'null']
          format: date-time
          description: "Fecha y hora del partido. Si se omite, se obtiene de la API externa."

    Team:
      type: object
      required: [id, name, code, isTop8, positionStats, standing]
      properties:
        id:     { type: string, format: uuid }
        name:   { type: string }
        code:   { type: string, description: "Código ISO 3 letras, ej: COL" }
        isTop8: { type: boolean }
        flag:   { type: [string, 'null'], description: "URL de la bandera del equipo" }
        positionStats:
          description: >
            Estadísticas de predicción por posición. Array de hasta 4 entradas (una por posición
            donde al menos un participante predijo este equipo). Null hasta que el cron
            calculate-group-stats corra el 11 de junio a las 2PM Colombia.
          oneOf:
            - type: array
              items:
                type: object
                required: [position, pct]
                properties:
                  position: { type: integer, minimum: 1, maximum: 4 }
                  pct:      { type: number, description: "% de participantes que pusieron a este equipo en esta posición (0.0–100.0)" }
            - type: 'null'
        standing:
          description: >
            Standing real del equipo en su grupo, calculado en vivo desde los resultados de
            los partidos por sync-group-results. Los partidos LIVE suman pts/goles al
            instante; matchesPlayed cuenta solo partidos finalizados. Null hasta que el
            equipo tenga al menos un partido con marcador. Orden de teams dentro del grupo:
            por realPosition ascendente.
          oneOf:
            - type: object
              required: [realPosition, pts, matchesPlayed, goalsFor, goalsAgainst, goalDiff]
              properties:
                realPosition: { type: [integer, 'null'], minimum: 1, maximum: 4, description: "Posición en la tabla (1–4) por pts → diferencia de gol → goles a favor" }
                pts:          { type: integer }
                matchesPlayed: { type: integer, description: "Solo partidos FINISHED" }
                goalsFor:     { type: integer }
                goalsAgainst: { type: integer }
                goalDiff:     { type: integer, description: "goalsFor - goalsAgainst" }
            - type: 'null'

    Group:
      type: object
      required: [id, label, name, locked, teams]
      properties:
        id:    { type: string, format: uuid }
        label: { type: string, description: "Letra del grupo, ej: A" }
        name:  { type: string, description: "Nombre completo, ej: Grupo A" }
        locked:
          type: boolean
          description: "true si el admin cerró este grupo individualmente (lockedAt <= NOW()). El FE usa esto para deshabilitar la edición."
        teams:
          type: array
          items:
            $ref: '#/components/schemas/Team'

    GroupMatchTeam:
      type: object
      description: Equipo dentro de un partido de fase de grupos (versión reducida, informativa).
      required: [id, name, code]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string }
        code: { type: string, description: "Código ISO 3 letras, ej: COL" }
        flag: { type: [string, 'null'], description: "URL de la bandera del equipo" }

    GroupMatch:
      type: object
      description: >
        Partido de fase de grupos. Informativo: no impacta puntos ni score_events.
        Los campos de equipo y marcador son null hasta que el cron sync-group-results
        los actualice desde la API externa.
      required:
        [id, matchNumber, groupId, groupLabel, scheduledAt, status,
         homeTeam, awayTeam, homeTeamLabel, awayTeamLabel, scoreHome, scoreAway]
      properties:
        id:          { type: string, format: uuid }
        matchNumber: { type: integer, description: "Número de partido del torneo" }
        groupId:     { type: [string, 'null'], format: uuid, description: "Grupo del partido (derivado del equipo). Null si no hay equipos asignados aún." }
        groupLabel:  { type: [string, 'null'], description: "Letra del grupo, ej: A" }
        scheduledAt: { type: string, format: date-time }
        status:
          type: string
          enum: [SCHEDULED, LIVE, FINISHED]
          description: "Estado del partido. Actualizado por el cron sync-group-results."
        homeTeam:
          oneOf:
            - $ref: '#/components/schemas/GroupMatchTeam'
            - type: 'null'
        awayTeam:
          oneOf:
            - $ref: '#/components/schemas/GroupMatchTeam'
            - type: 'null'
        homeTeamLabel: { type: [string, 'null'], description: "Etiqueta del equipo local; cae al nombre del equipo si no hay etiqueta." }
        awayTeamLabel: { type: [string, 'null'], description: "Etiqueta del equipo visitante; cae al nombre del equipo si no hay etiqueta." }
        scoreHome:     { type: [integer, 'null'], description: "Goles local. Null hasta que el partido empiece." }
        scoreAway:     { type: [integer, 'null'], description: "Goles visitante. Null hasta que el partido empiece." }

    GroupRanking:
      type: object
      description: Posición predicha de un equipo dentro de su grupo
      required: [teamId, name, code, isTop8, predictedPosition, positionStats]
      properties:
        teamId:            { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        isTop8:            { type: boolean }
        flag:              { type: [string, 'null'], description: "URL de la bandera del equipo" }
        predictedPosition: { type: integer, minimum: 1, maximum: 4 }
        positionStats:
          description: >
            Estadística de cuántos participantes predijeron a este equipo en la misma posición
            que tú (predictedPosition). Null hasta que el cron corra el 11 de junio.
          oneOf:
            - type: object
              required: [pct]
              properties:
                pct: { type: number, description: "% de participantes que pusieron a este equipo en predictedPosition (0.0–100.0)" }
            - type: 'null'

    GroupPrediction:
      type: object
      required: [groupId, label, name, groupComplete, rankings]
      properties:
        groupId:
          type: string
          format: uuid
        label:
          type: string
        name:
          type: string
        groupComplete:
          type: boolean
          description: "true si las 4 posiciones del grupo están predichas"
        rankings:
          type: array
          items:
            $ref: '#/components/schemas/GroupRanking'
          minItems: 0
          maxItems: 4
        pointsEarned:
          description: >
            Puntos obtenidos en este grupo. Null mientras el torneo no tiene
            resultados oficiales de fase de grupos. Las llaves corresponden
            a los keys de scoring_params.
          oneOf:
            - type: object
              required: [pts_group_position_exact, bonus_group_complete, total]
              properties:
                pts_group_position_exact:
                  type: integer
                  description: "Puntos por equipos en posición exacta (exactCount × pts_group_position_exact)"
                bonus_group_complete:
                  type: integer
                  description: "Bonus por acertar los 4 exactos. 0 si no aplica."
                total:
                  type: integer
                  description: "Total de puntos en este grupo"
            - type: 'null'

    ThirdCandidate:
      type: object
      description: >
        Equipo que el participante predijo en posición 3 de su grupo.
        Solo aparece si el grupo tiene predicción completa.
      required: [teamId, name, code, groupId, label, selected]
      properties:
        teamId:   { type: string, format: uuid }
        name:     { type: string }
        code:     { type: string }
        flag:     { type: [string, 'null'], description: "URL de la bandera del equipo" }
        groupId:  { type: string, format: uuid }
        label:    { type: string, description: "Letra del grupo al que pertenece" }
        selected: { type: boolean, description: "true si fue marcado como mejor tercero" }
        pointsEarned:
          description: >
            Puntos obtenidos por este tercero. Null mientras no se conocen los
            8 mejores terceros oficiales del torneo.
          oneOf:
            - type: object
              required: [pts_third_correct, total]
              properties:
                pts_third_correct:
                  type: integer
                  description: "Puntos por acertar que este equipo clasificó como mejor tercero. 0 si no clasificó."
                total:
                  type: integer
                  description: "Total de puntos sumados por este tercero"
            - type: 'null'

    ParticipantPredictions:
      type: object
      required: [participant, predictions, totalGroupPoints]
      properties:
        participant:
          type: object
          required: [id, name]
          properties:
            id:   { type: string, format: uuid }
            name: { type: string }
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/GroupPrediction'
        totalGroupPoints:
          type: integer
          description: "Suma de puntos obtenidos en todos los grupos. 0 mientras no hay resultados."

    KoResult:
      type: object
      description: Resultado oficial del partido. Null si aún no ha terminado.
      required: [scoreHome, scoreAway, winnerTeamId]
      properties:
        scoreHome:    { type: integer, minimum: 0 }
        scoreAway:    { type: integer, minimum: 0 }
        winnerTeamId: { type: string, format: uuid }

    KoMyPrediction:
      type: object
      description: Predicción propia del participante autenticado. Null si no ha predicho.
      required: [scoreHome, scoreAway, teamAdvancesId, tripleActive, lockedIn]
      properties:
        scoreHome:      { type: integer, minimum: 0 }
        scoreAway:      { type: integer, minimum: 0 }
        teamAdvancesId: { type: string, format: uuid }
        tripleActive:   { type: boolean }
        lockedIn:
          type: boolean
          description: "true si NOW() >= lockedAt. El frontend usa esto para mostrar el candado."
        pointsEarned:
          description: >
            Puntos obtenidos en este partido. Null mientras el partido no tiene
            resultado oficial. Las llaves corresponden a los keys de scoring_params.
          oneOf:
            - type: object
              required: [pts_ko_advances, pts_ko_exact_score, mult_triple, scale_factor, scale_slug, total]
              properties:
                pts_ko_advances:
                  type: integer
                  description: "Puntos por acertar quién avanza, independiente del marcador"
                pts_ko_exact_score:
                  type: integer
                  description: "Puntos por marcador exacto a 120'"
                mult_triple:
                  type: integer
                  description: "Puntos adicionales por triple o nada. 0 si no estaba activo o no acertó"
                scale_factor:
                  type: number
                  description: "Multiplicador de ronda aplicado (scale_r32, scale_r16, scale_qf, scale_sf o scale_final)"
                scale_slug:
                  type: string
                  enum: [scale_r32, scale_r16, scale_qf, scale_sf, scale_final]
                  description: "Key del multiplicador de ronda aplicado"
                total:
                  type: integer
                  description: "Total de puntos sumados en este partido"
            - type: 'null'

    KoTeam:
      type: object
      description: Equipo del partido. Null si el cruce aún no está definido.
      required: [id, name, code]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        flag: { type: [string, 'null'], description: "URL de la bandera del equipo" }

    KoMatch:
      type: object
      required: [id, externalMatchId, matchNumber, scheduledAt, lockedAt, status, homeTeamLabel, awayTeamLabel]
      properties:
        id:
          type: string
          format: uuid
        externalMatchId:
          type: integer
          description: "ID numérico en la API externa worldcup2026 (1–104)"
        matchNumber:
          type: integer
        scheduledAt:
          type: string
          format: date-time
        lockedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [SCHEDULED, LIVE, FINISHED]
        homeTeam:
          description: "Null si el cruce aún no está definido"
          oneOf:
            - $ref: '#/components/schemas/KoTeam'
            - type: 'null'
        awayTeam:
          oneOf:
            - $ref: '#/components/schemas/KoTeam'
            - type: 'null'
        homeTeamLabel:
          type: [string, 'null']
          description: "Placeholder cuando homeTeam es null, ej: Runner-up Group A"
        awayTeamLabel:
          type: [string, 'null']
        result:
          oneOf:
            - $ref: '#/components/schemas/KoResult'
            - type: 'null'
        myPrediction:
          oneOf:
            - $ref: '#/components/schemas/KoMyPrediction'
            - type: 'null'
        stats:
          description: >
            Estadísticas agregadas de predicciones. Null hasta que el partido comienza
            (LIVE o FINISHED). Oculto antes del inicio para no sesgar predicciones.
          oneOf:
            - $ref: '#/components/schemas/KoMatchStats'
            - type: 'null'

    KoMatchStats:
      type: object
      required: [totalPredictions, pctHomeWin, pctDraw, pctAwayWin, pctTripleActive, topScore]
      properties:
        totalPredictions:
          type: integer
          description: "Total de predicciones registradas para este partido"
        pctHomeWin:
          type: number
          description: "% de participantes que predicen victoria del equipo local (0.0–100.0)"
        pctDraw:
          type: number
          description: "% de participantes que predicen empate"
        pctAwayWin:
          type: number
          description: "% de participantes que predicen victoria del equipo visitante"
        pctTripleActive:
          type: number
          description: "% de participantes con triple-o-nada activado en este partido"
        topScore:
          description: "Marcador más predicho. Null si no hay predicciones."
          oneOf:
            - type: object
              required: [home, away, pct]
              properties:
                home: { type: integer }
                away: { type: integer }
                pct:  { type: number, description: "% de predicciones con este marcador exacto" }
            - type: 'null'

    KoRound:
      type: object
      required: [slug, name, order]
      properties:
        slug:  { type: string, enum: [GROUP, R32, R16, QF, SF, THIRD, FINAL] }
        name:  { type: string }
        order: { type: integer }

    FriendKoPrediction:
      type: object
      required: [participant, prediction]
      properties:
        participant:
          type: object
          required: [id, name]
          properties:
            id:   { type: string, format: uuid }
            name: { type: string }
        prediction:
          description: "Null si el participante no ha predicho ese partido"
          oneOf:
            - type: object
              required: [scoreHome, scoreAway, teamAdvancesId, tripleActive]
              properties:
                scoreHome:      { type: integer }
                scoreAway:      { type: integer }
                teamAdvancesId: { type: string, format: uuid }
                tripleActive:   { type: boolean }
            - type: 'null'

    PowerupTeam:
      type: object
      description: Equipo seleccionado como powerup. Null si aún no se ha guardado.
      required: [teamId, name, code, isTop8, stats]
      properties:
        teamId: { type: string, format: uuid }
        name:   { type: string }
        code:   { type: string }
        isTop8: { type: boolean }
        flag:   { type: [string, 'null'], description: "URL de la bandera del equipo" }
        stats:
          type: object
          required: [chosenPct]
          properties:
            chosenPct:
              description: >
                % de participantes que eligieron este equipo para el mismo powerup (caballo negro o
                decepción según el contexto). Null hasta que el cron calculate-powerup-stats corra
                al inicio del torneo.
              oneOf:
                - type: number
                  description: "Porcentaje (0.0–100.0)"
                - type: 'null'

    MyPowerups:
      type: object
      description: >
        Powerups del participante autenticado. darkHorse y disappointment son null
        si aún no ha guardado sus powerups.
      required: [darkHorse, disappointment]
      properties:
        darkHorse:
          oneOf:
            - $ref: '#/components/schemas/PowerupTeam'
            - type: 'null'
        disappointment:
          oneOf:
            - $ref: '#/components/schemas/PowerupTeam'
            - type: 'null'
        pointsEarned:
          description: >
            Puntos acumulados por powerups hasta la ronda más reciente con resultado.
            Null mientras el torneo no tiene resultados oficiales.
            Se actualiza después de cada ronda completada.
          oneOf:
            - type: object
              required: [pts_dark_horse_per_round, pts_disappointment_per_round, dark_horse_rounds_advanced, disappointment_rounds_advanced, total]
              properties:
                pts_dark_horse_per_round:
                  type: integer
                  description: "Puntos acumulados por rondas avanzadas del caballo negro (siempre >= 0)"
                pts_disappointment_per_round:
                  type: integer
                  description: "Puntos restados por rondas avanzadas de la decepción (siempre <= 0)"
                dark_horse_rounds_advanced:
                  type: integer
                  description: "Número de rondas que ha avanzado el caballo negro hasta ahora"
                disappointment_rounds_advanced:
                  type: integer
                  description: "Número de rondas que ha avanzado la decepción hasta ahora"
                total:
                  type: integer
                  description: "Suma de pts_dark_horse_per_round + pts_disappointment_per_round"
            - type: 'null'

    FriendPowerups:
      type: object
      required: [participant, darkHorse, disappointment]
      properties:
        participant:
          type: object
          required: [id, name]
          properties:
            id:   { type: string, format: uuid }
            name: { type: string }
        darkHorse:
          oneOf:
            - $ref: '#/components/schemas/PowerupTeam'
            - type: 'null'
        disappointment:
          oneOf:
            - $ref: '#/components/schemas/PowerupTeam'
            - type: 'null'

    ScoreboardEntry:
      type: object
      required: [rank, participant, total, prize]
      properties:
        rank:
          type: integer
          description: "Posición en la tabla. Empieza en 1."
        participant:
          type: object
          required: [id, name]
          properties:
            id:   { type: string, format: uuid }
            name: { type: string }
        total:
          type: integer
          description: "Puntaje total acumulado"
        prize:
          type: [integer, 'null']
          description: "Premio en COP. 700000 para rank 1, 250000 para rank 2, 50000 para rank 3. Null para rank 4 en adelante."

    ScoreBreakdown:
      type: object
      required: [participant, total, breakdown, tripleUsesRemaining, prize]
      properties:
        participant:
          type: object
          required: [id, name]
          properties:
            id:   { type: string, format: uuid }
            name: { type: string }
        total:
          type: integer
          description: "Puntaje total acumulado"
        breakdown:
          type: object
          required: [groups, thirds, ko, darkHorse, disappointment]
          properties:
            groups:
              type: integer
              description: "Puntos de fase de grupos (posiciones acertadas + bonus)"
            thirds:
              type: integer
              description: "Puntos por mejores terceros acertados"
            ko:
              type: integer
              description: "Puntos acumulados en fase KO (avances + marcadores exactos + triple)"
            darkHorse:
              type: integer
              description: "Puntos acumulados por rondas avanzadas del caballo negro"
            disappointment:
              type: integer
              description: "Puntos restados por rondas avanzadas de la decepción (valor negativo o cero)"
        tripleUsesRemaining:
          type: integer
          minimum: 0
          maximum: 3
          description: "Usos de triple o nada disponibles del participante consultado."
        prize:
          type: [integer, 'null']
          description: "Premio en COP si está en el podio. Null si no."
